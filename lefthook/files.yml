pre-commit:
  parallel: true
  commands:
    trailing-whitespace:
      glob: "**/*.{yaml,yml,md,json}"
      run: task hooks:trailing-whitespace
      fail_text: "trailing whitespace found"

    end-of-file:
      glob: "**/*.{yaml,yml,md,json}"
      run: task hooks:end-of-file
      fail_text: "files must end with newline"

    check-large-files:
      run: task hooks:check-large-files
      fail_text: "file exceeds 500KB limit"

    check-merge-conflict:
      run: task hooks:check-merge-conflict
      fail_text: "merge conflict markers found"
